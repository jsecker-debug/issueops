name: IssueOps Triage & Fix

on:
  issues:
    types: [labeled]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    if: >-
      github.event.label.name == 'devin-triage' ||
      github.event.label.name == 'devin-fix'
    steps:
      - name: Determine action
        id: action
        run: |
          if [ "${{ github.event.label.name }}" = "devin-triage" ]; then
            echo "action=triage" >> "$GITHUB_OUTPUT"
          else
            echo "action=fix" >> "$GITHUB_OUTPUT"
          fi

      - name: Call IssueOps backend
        env:
          ISSUEOPS_BACKEND_URL: ${{ secrets.ISSUEOPS_BACKEND_URL }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          jq -n \
            --arg repo "${{ github.repository }}" \
            --arg title "$ISSUE_TITLE" \
            --arg body "$ISSUE_BODY" \
            --arg sender "${{ github.actor }}" \
            '{repository: $repo, issue_title: $title, issue_body: $body, sender: $sender}' | \
          curl -sf -X POST \
            "${ISSUEOPS_BACKEND_URL}/api/issues/${{ github.event.issue.number }}/${{ steps.action.outputs.action }}" \
            -H "Content-Type: application/json" \
            -d @-

